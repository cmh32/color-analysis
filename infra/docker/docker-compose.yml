version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: color-analysis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: color_analysis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d color_analysis"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: color-analysis-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: color-analysis-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/color-analysis;
      exit 0;
      "

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      COLOR_ANALYSIS_POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@postgres:5432/color_analysis
      COLOR_ANALYSIS_REDIS_URL: redis://redis:6379/0
      COLOR_ANALYSIS_S3_ENDPOINT_URL: http://minio:9000
      COLOR_ANALYSIS_S3_ACCESS_KEY_ID: minioadmin
      COLOR_ANALYSIS_S3_SECRET_ACCESS_KEY: minioadmin
      COLOR_ANALYSIS_S3_BUCKET: color-analysis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      COLOR_ANALYSIS_POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@postgres:5432/color_analysis
      COLOR_ANALYSIS_REDIS_URL: redis://redis:6379/0
      COLOR_ANALYSIS_S3_ENDPOINT_URL: http://minio:9000
      COLOR_ANALYSIS_S3_ACCESS_KEY_ID: minioadmin
      COLOR_ANALYSIS_S3_SECRET_ACCESS_KEY: minioadmin
      COLOR_ANALYSIS_S3_BUCKET: color-analysis
    command: ["python", "-m", "color_analysis.workers.main"]
